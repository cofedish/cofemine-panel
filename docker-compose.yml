name: cofemine

# Dev compose: brings up db, panel-api, node-agent, and panel-web.
# The web service is reachable at http://localhost:3000.
# The agent is NOT exposed to the host; only panel-api talks to it.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cofemine}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cofemine}
      POSTGRES_DB: ${POSTGRES_DB:-cofemine}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cofemine}"]
      interval: 5s
      timeout: 3s
      retries: 20

  agent:
    build:
      context: .
      dockerfile: apps/agent/Dockerfile
    restart: unless-stopped
    environment:
      AGENT_PORT: "4100"
      AGENT_HOST: "0.0.0.0"
      AGENT_TOKEN: ${AGENT_TOKEN:?AGENT_TOKEN required}
      AGENT_DATA_ROOT: ${DATA_ROOT:-/var/lib/cofemine/servers}
      AGENT_BACKUP_ROOT: ${BACKUP_ROOT:-/var/lib/cofemine/backups}
      AGENT_DOCKER_NETWORK: "cofemine_mcnet"
      AGENT_LABEL_PREFIX: "cofemine"
      DOCKER_SOCKET: "/var/run/docker.sock"
      AGENT_MC_MAX_RETRIES: ${AGENT_MC_MAX_RETRIES:-10}
      AGENT_MC_RETRY_BACKOFF: ${AGENT_MC_RETRY_BACKOFF:-10}
    volumes:
      # Docker socket so the agent can start Minecraft containers.
      - /var/run/docker.sock:/var/run/docker.sock
      # Bind the SAME host paths into the agent that it will pass to
      # Minecraft containers as `Binds`. Named volumes here would make
      # the agent and MC containers resolve /var/lib/cofemine/servers to
      # different host locations, so the agent would never see mods /
      # plugins / server-icon.png written by itzg inside the container.
      - ${DATA_ROOT:-/var/lib/cofemine/servers}:${DATA_ROOT:-/var/lib/cofemine/servers}
      - ${BACKUP_ROOT:-/var/lib/cofemine/backups}:${BACKUP_ROOT:-/var/lib/cofemine/backups}
    networks:
      - cofemine_internal
      - cofemine_mcnet

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PORT: "4000"
      API_HOST: "0.0.0.0"
      API_PUBLIC_URL: ${API_PUBLIC_URL:-http://localhost:4000}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-cofemine}:${POSTGRES_PASSWORD:-cofemine}@db:5432/${POSTGRES_DB:-cofemine}?schema=public
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required}
      SECRETS_KEY: ${SECRETS_KEY:?SECRETS_KEY required}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-168}
      MODRINTH_USER_AGENT: ${MODRINTH_USER_AGENT:-cofemine-panel/0.1}
      # Used by seed script to auto-register the local node
      AGENT_TOKEN: ${AGENT_TOKEN}
      AGENT_PUBLIC_URL: http://agent:4100
      BOOTSTRAP_OWNER_EMAIL: ${BOOTSTRAP_OWNER_EMAIL:-}
      BOOTSTRAP_OWNER_USERNAME: ${BOOTSTRAP_OWNER_USERNAME:-}
      BOOTSTRAP_OWNER_PASSWORD: ${BOOTSTRAP_OWNER_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
      agent:
        condition: service_started
    networks:
      - cofemine_internal

  # Dedicated process for the live-map proxy. Same image as `api`,
  # different entrypoint. See docker-compose.prod.yml for the full
  # rationale; in short, BlueMap's parallel tile-fetch storm shouldn't
  # share the panel API's event loop.
  map-proxy:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    # The api image runs through `tsx` (not compiled `node dist/...`)
    # because @cofemine/shared is exported as raw .ts. Use the same
    # loader for consistency with how api/main.ts is launched.
    command: ["pnpm", "exec", "tsx", "src/map-proxy-main.ts"]
    environment:
      NODE_ENV: production
      MAP_PROXY_PORT: "4500"
      MAP_PROXY_HOST: "0.0.0.0"
      DATABASE_URL: postgresql://${POSTGRES_USER:-cofemine}:${POSTGRES_PASSWORD:-cofemine}@db:5432/${POSTGRES_DB:-cofemine}?schema=public
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required}
      SECRETS_KEY: ${SECRETS_KEY:?SECRETS_KEY required}
      AGENT_TOKEN: ${AGENT_TOKEN}
      AGENT_PUBLIC_URL: http://agent:4100
    depends_on:
      db:
        condition: service_healthy
      agent:
        condition: service_started
    networks:
      - cofemine_internal

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_INTERNAL_URL: http://api:4000
      MAP_PROXY_INTERNAL_URL: http://map-proxy:4500
    depends_on:
      - api
      - map-proxy
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      # Background-music drop-in. Put mp3/ogg files + manifest.json on
      # the host at $AUDIO_DIR (defaults to ./apps/web/public/audio in
      # the repo) and they show up at /audio/* inside the panel
      # without rebuilding the image. See apps/web/public/audio/README
      # for the manifest format.
      - ${AUDIO_DIR:-./apps/web/public/audio}:/app/apps/web/public/audio:ro
    networks:
      - cofemine_internal

volumes:
  db_data:
  # Server data lives on bind-mounted host paths (DATA_ROOT, BACKUP_ROOT)
  # rather than named volumes, so the agent and MC containers see the
  # same filesystem. See the agent service for the bind spec.

networks:
  cofemine_internal:
    driver: bridge
  # Dedicated network that MC containers (spawned by the agent) will join,
  # so they can address each other and the agent if needed.
  cofemine_mcnet:
    name: cofemine_mcnet
    driver: bridge
