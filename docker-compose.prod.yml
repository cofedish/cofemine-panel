name: cofemine

# Production compose. Images are pulled from GHCR — CI builds and pushes
# them on every merge to main. Put a reverse proxy (Caddy/nginx/Traefik) in
# front of the web service in real deployments; by default we expose it on
# WEB_PORT so the panel works out of the box.

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 3s
      retries: 10
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }
    networks: [cofemine_internal]

  agent:
    image: ${AGENT_IMAGE:-ghcr.io/cofedish/cofemine-panel/agent:latest}
    restart: always
    environment:
      AGENT_TOKEN: ${AGENT_TOKEN}
      AGENT_DATA_ROOT: "/var/lib/cofemine/servers"
      AGENT_BACKUP_ROOT: "/var/lib/cofemine/backups"
      AGENT_DOCKER_NETWORK: "cofemine_mcnet"
      AGENT_LABEL_PREFIX: "cofemine"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - mc_data:/var/lib/cofemine/servers
      - mc_backups:/var/lib/cofemine/backups
    networks: [cofemine_internal, cofemine_mcnet]
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }

  api:
    image: ${API_IMAGE:-ghcr.io/cofedish/cofemine-panel/api:latest}
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      SECRETS_KEY: ${SECRETS_KEY}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      API_PUBLIC_URL: ${API_PUBLIC_URL:-http://localhost:4000}
      AGENT_TOKEN: ${AGENT_TOKEN}
      AGENT_PUBLIC_URL: http://agent:4100
      BOOTSTRAP_OWNER_EMAIL: ${BOOTSTRAP_OWNER_EMAIL:-}
      BOOTSTRAP_OWNER_USERNAME: ${BOOTSTRAP_OWNER_USERNAME:-}
      BOOTSTRAP_OWNER_PASSWORD: ${BOOTSTRAP_OWNER_PASSWORD:-}
    depends_on:
      db: { condition: service_healthy }
      agent: { condition: service_started }
    networks: [cofemine_internal]
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }

  web:
    image: ${WEB_IMAGE:-ghcr.io/cofedish/cofemine-panel/web:latest}
    restart: always
    environment:
      NODE_ENV: production
      API_INTERNAL_URL: http://api:4000
    depends_on: [api]
    ports:
      - "${WEB_PORT:-3000}:3000"
    networks: [cofemine_internal]
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }

volumes:
  db_data:
  mc_data:
  mc_backups:

networks:
  cofemine_internal:
    driver: bridge
  cofemine_mcnet:
    name: cofemine_mcnet
    driver: bridge
