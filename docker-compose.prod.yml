name: cofemine

# Production compose. Images are pulled from GHCR — CI builds and pushes
# them on every merge to main. Put a reverse proxy (Caddy/nginx/Traefik) in
# front of the web service in real deployments; by default we expose it on
# WEB_PORT so the panel works out of the box.

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 3s
      retries: 10
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }
    networks: [cofemine_internal]

  agent:
    image: ${AGENT_IMAGE:-ghcr.io/cofedish/cofemine-panel/agent:latest}
    restart: always
    environment:
      AGENT_TOKEN: ${AGENT_TOKEN}
      AGENT_DATA_ROOT: ${DATA_ROOT:-/var/lib/cofemine/servers}
      AGENT_BACKUP_ROOT: ${BACKUP_ROOT:-/var/lib/cofemine/backups}
      AGENT_DOCKER_NETWORK: "cofemine_mcnet"
      AGENT_LABEL_PREFIX: "cofemine"
      AGENT_MC_MAX_RETRIES: ${AGENT_MC_MAX_RETRIES:-10}
      AGENT_MC_RETRY_BACKOFF: ${AGENT_MC_RETRY_BACKOFF:-10}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Bind the SAME host paths into the agent as it will later hand to
      # Minecraft containers in their `Binds`. Docker interprets Bind
      # sources as host paths; if we used named volumes here, the agent
      # and the MC containers would resolve /var/lib/cofemine/servers to
      # two different locations on the host and the agent would never see
      # mods/plugins/icons written by itzg.
      - ${DATA_ROOT:-/var/lib/cofemine/servers}:${DATA_ROOT:-/var/lib/cofemine/servers}
      - ${BACKUP_ROOT:-/var/lib/cofemine/backups}:${BACKUP_ROOT:-/var/lib/cofemine/backups}
    networks: [cofemine_internal, cofemine_mcnet]
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }

  api:
    image: ${API_IMAGE:-ghcr.io/cofedish/cofemine-panel/api:latest}
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      SECRETS_KEY: ${SECRETS_KEY}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      API_PUBLIC_URL: ${API_PUBLIC_URL:-http://localhost:4000}
      AGENT_TOKEN: ${AGENT_TOKEN}
      AGENT_PUBLIC_URL: http://agent:4100
      BOOTSTRAP_OWNER_EMAIL: ${BOOTSTRAP_OWNER_EMAIL:-}
      BOOTSTRAP_OWNER_USERNAME: ${BOOTSTRAP_OWNER_USERNAME:-}
      BOOTSTRAP_OWNER_PASSWORD: ${BOOTSTRAP_OWNER_PASSWORD:-}
    depends_on:
      db: { condition: service_healthy }
      agent: { condition: service_started }
    networks: [cofemine_internal]
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }

  web:
    image: ${WEB_IMAGE:-ghcr.io/cofedish/cofemine-panel/web:latest}
    restart: always
    environment:
      NODE_ENV: production
      API_INTERNAL_URL: http://api:4000
    depends_on: [api]
    volumes:
      # Background-music drop-in. AUDIO_DIR points to a host directory
      # holding manifest.json + your mp3/ogg/etc. Default resolves to
      # the project's apps/web/public/audio relative to this compose
      # file — works out of the box when prod deploy lives next to the
      # cloned repo. Override with AUDIO_DIR=/some/path in .env if the
      # files live elsewhere. Mounted :ro since the panel never writes.
      # NOTE: this path must EXIST on the host, otherwise Docker
      # creates an empty dir and mounts it on top of whatever the
      # image baked in — that hides the in-image manifest.json and
      # /audio/manifest.json starts returning 404.
      - ${AUDIO_DIR:-./apps/web/public/audio}:/app/apps/web/public/audio:ro
    # No ports published on the host. Caddy (running in Docker) reaches the
    # panel via the shared external network below as `web:3000`. The default
    # shared network name is `caddy` — it's expected to already exist (the
    # user's Caddy stack owns it and hosts many projects on it). Override
    # with the CADDY_NETWORK env var if you use a different name.
    networks: [cofemine_internal, caddy_net]
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }

volumes:
  db_data:
  # mc_data / mc_backups are now bind-mounts to DATA_ROOT / BACKUP_ROOT,
  # not named volumes, so the agent and MC containers see the same host
  # paths. See the agent service definition.

networks:
  cofemine_internal:
    driver: bridge
  cofemine_mcnet:
    name: cofemine_mcnet
    driver: bridge
  # External network owned by the user's Caddy stack; many projects share
  # it. Docker alias inside the compose file is `caddy_net` (can't use a
  # hyphen as a yaml key), but the real network name is whatever
  # CADDY_NETWORK resolves to (default: `caddy`).
  caddy_net:
    name: ${CADDY_NETWORK:-caddy}
    external: true
