<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" shape-rendering="crispEdges">
  <!-- Solid lime background — iOS masks this into a squircle, so no
       rounded corners or transparency needed in the SVG itself. -->
  <rect width="180" height="180" fill="#65a30d"/>

  <!-- Same isometric block, scaled up. The coordinates are the LogoMark
       silhouette mapped into a 180-wide canvas with a generous margin so
       iOS's squircle mask never clips the steam. -->
  <g transform="translate(28 28) scale(3.875)">
    <path d="M6 10l10-5 10 5-10 5L6 10z" fill="#bef264"/>
    <path d="M6 10v13l10 5V15L6 10z" fill="#365314"/>
    <path d="M26 10v13l-10 5V15l10-5z" fill="#4d7c0f"/>
    <path d="M16 8.5l-4 2 4 2 4-2-4-2z" fill="#ffffff" fill-opacity="0.45"/>
    <path d="M13 3c0 1.2 1.5 1.2 1.5 2.5M17 2c0 1.2 1.5 1.2 1.5 2.5"
          stroke="#ffffff" stroke-width="1.4" stroke-linecap="round" fill="none"/>
  </g>
</svg>
