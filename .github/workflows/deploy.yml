name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      hard_restart:
        description: "Hard restart (docker compose down && up). Use when containers are stuck to a stale network or volume."
        type: boolean
        default: false

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api, agent, web]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    name: Deploy to server
    needs: build
    runs-on: ubuntu-latest
    env:
      # Default strategy: `up -d --force-recreate`. Recreates containers
      # (new images + new config apply) but does NOT tear down networks.
      # Re-creating networks via `docker compose down` has reproducibly
      # left Docker on kernel 6.17 + nftables in a stale-veth state where
      # containers share a bridge but TCP silently drops — see incident
      # history. Hard reset (`down && up -d`) is still available via the
      # `[reset-stack]` / `[hard-restart]` commit-message marker or the
      # workflow_dispatch checkbox, for when you need to clear networks.
      HARD_RESTART: >-
        ${{
          github.event.inputs.hard_restart == 'true'
          || contains(github.event.head_commit.message, '[reset-stack]')
          || contains(github.event.head_commit.message, '[hard-restart]')
        }}
    steps:
      - name: SSH pull & restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          envs: HARD_RESTART
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            COMPOSE="docker compose -f docker-compose.prod.yml"

            echo "::group::git update"
            git fetch --prune
            git reset --hard origin/main
            echo "::endgroup::"

            echo "::group::docker compose pull"
            $COMPOSE pull
            echo "::endgroup::"

            if [ "${HARD_RESTART:-false}" = "true" ]; then
              echo "::group::docker compose down (hard restart — network reset)"
              $COMPOSE down || true
              echo "::endgroup::"
              echo "::group::docker compose up -d"
              $COMPOSE up -d
              echo "::endgroup::"
            else
              echo "::group::docker compose up -d --force-recreate (preserve networks)"
              # Recreate containers so new images take effect, but keep the
              # existing networks so we don't hit the stale-veth bug.
              $COMPOSE up -d --force-recreate
              echo "::endgroup::"
            fi

            echo "::group::ps after up"
            $COMPOSE ps
            echo "::endgroup::"

            echo "::group::docker image prune"
            docker image prune -f || true
            echo "::endgroup::"

      - name: Health check
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            COMPOSE="docker compose -f ${{ secrets.DEPLOY_PATH }}/docker-compose.prod.yml"
            # Use node's built-in fetch instead of busybox wget — node is
            # guaranteed present in the api image, and this is the same
            # runtime that serves /health, so a success here proves the
            # whole stack is live.
            PROBE='fetch("http://127.0.0.1:4000/health").then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))'
            # Give the API up to ~3 minutes. First deploys do Postgres
            # initdb + prisma db push + seed, which legitimately needs time.
            for i in $(seq 1 36); do
              if $COMPOSE exec -T api node -e "$PROBE" >/dev/null 2>&1; then
                echo "API healthy (after ${i} checks)"
                exit 0
              fi
              if [ "$((i % 6))" -eq 0 ]; then
                echo "--- still waiting (attempt $i/36); last 10 api log lines ---"
                $COMPOSE logs --tail=10 api || true
              else
                echo "waiting for API... ($i/36)"
              fi
              sleep 5
            done
            echo "API did not become healthy in time"
            echo "--- db logs ---"
            $COMPOSE logs --tail=50 db || true
            echo "--- api logs ---"
            $COMPOSE logs --tail=200 api || true
            exit 1
