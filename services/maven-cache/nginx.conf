worker_processes auto;
events { worker_connections 1024; }

http {
    # Docker resolver — used here only for the (lack of) variable
    # hostnames; all upstream blocks point at 127.0.0.1:8XXX which gost
    # set up in entrypoint.sh.
    resolver 127.0.0.11 ipv6=off valid=300s;
    resolver_timeout 10s;

    proxy_cache_path /var/cache/nginx/maven
        levels=1:2
        keys_zone=maven:64m
        max_size=40g
        inactive=180d
        use_temp_path=off;

    # Big buffers — NeoForge installer is ~7 MB, mod jars up to 60+ MB.
    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 16 64k;
    proxy_busy_buffers_size 128k;
    proxy_max_temp_file_size 1024m;

    # SNI to upstream over the gost relay. proxy_ssl_name is set per
    # location so the cert validation against the real CDN works.
    proxy_ssl_server_name on;

    log_format cache '$remote_addr $upstream_cache_status $request '
                     '→ $proxy_host (HTTP $status, ${request_time}s)';
    access_log /var/log/nginx/access.log cache;
    error_log /var/log/nginx/error.log warn;

    server {
        listen 80;
        server_name _;

        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        location = /stub_status {
            stub_status;
            allow all;
        }

        # ------- NeoForge maven (releases + libraries) -------------
        location /neoforge/ {
            proxy_pass https://127.0.0.1:8001/;
            proxy_set_header Host maven.neoforged.net;
            proxy_set_header User-Agent "cofemine-maven-cache/0.1";
            proxy_ssl_name maven.neoforged.net;
            proxy_cache maven;
            proxy_cache_valid 200 206 180d;
            proxy_cache_valid 404 5m;
            proxy_cache_key "neoforge:$request_uri";
            proxy_cache_use_stale error timeout updating http_502 http_503;
            proxy_read_timeout 300s;
            proxy_connect_timeout 30s;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # ------- Forge maven --------------------------------------
        location /forge/ {
            proxy_pass https://127.0.0.1:8002/;
            proxy_set_header Host maven.minecraftforge.net;
            proxy_set_header User-Agent "cofemine-maven-cache/0.1";
            proxy_ssl_name maven.minecraftforge.net;
            proxy_cache maven;
            proxy_cache_valid 200 206 180d;
            proxy_cache_valid 404 5m;
            proxy_cache_key "forge:$request_uri";
            proxy_cache_use_stale error timeout updating http_502 http_503;
            proxy_read_timeout 300s;
            add_header X-Cache-Status $upstream_cache_status;
        }
        location /forge-files/ {
            proxy_pass https://127.0.0.1:8003/;
            proxy_set_header Host files.minecraftforge.net;
            proxy_set_header User-Agent "cofemine-maven-cache/0.1";
            proxy_ssl_name files.minecraftforge.net;
            proxy_cache maven;
            proxy_cache_valid 200 206 180d;
            proxy_cache_valid 404 5m;
            proxy_cache_key "forge-files:$request_uri";
            add_header X-Cache-Status $upstream_cache_status;
        }

        # ------- Fabric -------------------------------------------
        location /fabric-meta/ {
            proxy_pass https://127.0.0.1:8004/;
            proxy_set_header Host meta.fabricmc.net;
            proxy_set_header User-Agent "cofemine-maven-cache/0.1";
            proxy_ssl_name meta.fabricmc.net;
            proxy_cache maven;
            # Meta JSON updates with new builds — keep TTL shorter.
            proxy_cache_valid 200 206 1h;
            proxy_cache_valid 404 5m;
            proxy_cache_key "fabric-meta:$request_uri";
            proxy_cache_use_stale error timeout updating http_502 http_503;
            add_header X-Cache-Status $upstream_cache_status;
        }
        location /fabric/ {
            proxy_pass https://127.0.0.1:8005/;
            proxy_set_header Host maven.fabricmc.net;
            proxy_set_header User-Agent "cofemine-maven-cache/0.1";
            proxy_ssl_name maven.fabricmc.net;
            proxy_cache maven;
            proxy_cache_valid 200 206 180d;
            proxy_cache_valid 404 5m;
            proxy_cache_key "fabric:$request_uri";
            add_header X-Cache-Status $upstream_cache_status;
        }

        # ------- Quilt --------------------------------------------
        location /quilt-meta/ {
            proxy_pass https://127.0.0.1:8006/;
            proxy_set_header Host meta.quiltmc.org;
            proxy_set_header User-Agent "cofemine-maven-cache/0.1";
            proxy_ssl_name meta.quiltmc.org;
            proxy_cache maven;
            proxy_cache_valid 200 206 1h;
            proxy_cache_valid 404 5m;
            proxy_cache_key "quilt-meta:$request_uri";
            add_header X-Cache-Status $upstream_cache_status;
        }
        location /quilt/ {
            proxy_pass https://127.0.0.1:8007/;
            proxy_set_header Host maven.quiltmc.org;
            proxy_set_header User-Agent "cofemine-maven-cache/0.1";
            proxy_ssl_name maven.quiltmc.org;
            proxy_cache maven;
            proxy_cache_valid 200 206 180d;
            proxy_cache_valid 404 5m;
            proxy_cache_key "quilt:$request_uri";
            add_header X-Cache-Status $upstream_cache_status;
        }

        # ------- Mojang piston-data + piston-meta -----------------
        location /piston-data/ {
            proxy_pass https://127.0.0.1:8008/;
            proxy_set_header Host piston-data.mojang.com;
            proxy_set_header User-Agent "cofemine-maven-cache/0.1";
            proxy_ssl_name piston-data.mojang.com;
            proxy_cache maven;
            proxy_cache_valid 200 206 180d;
            proxy_cache_valid 404 5m;
            proxy_cache_key "piston-data:$request_uri";
            add_header X-Cache-Status $upstream_cache_status;
        }
        location /piston-meta/ {
            proxy_pass https://127.0.0.1:8009/;
            proxy_set_header Host piston-meta.mojang.com;
            proxy_set_header User-Agent "cofemine-maven-cache/0.1";
            proxy_ssl_name piston-meta.mojang.com;
            proxy_cache maven;
            # Mojang publishes new MC versions; shorter TTL prevents
            # locking out new releases.
            proxy_cache_valid 200 206 6h;
            proxy_cache_valid 404 5m;
            proxy_cache_key "piston-meta:$request_uri";
            add_header X-Cache-Status $upstream_cache_status;
        }

        # ------- Mojang libraries ---------------------------------
        location /mojang-libs/ {
            proxy_pass https://127.0.0.1:8010/;
            proxy_set_header Host libraries.minecraft.net;
            proxy_set_header User-Agent "cofemine-maven-cache/0.1";
            proxy_ssl_name libraries.minecraft.net;
            proxy_cache maven;
            proxy_cache_valid 200 206 180d;
            proxy_cache_valid 404 5m;
            proxy_cache_key "mojang-libs:$request_uri";
            add_header X-Cache-Status $upstream_cache_status;
        }

        # ------- CurseForge edge CDN ------------------------------
        location /forgecdn/ {
            proxy_pass https://127.0.0.1:8011/;
            proxy_set_header Host edge.forgecdn.net;
            proxy_set_header User-Agent "cofemine-maven-cache/0.1";
            proxy_ssl_name edge.forgecdn.net;
            proxy_cache maven;
            proxy_cache_valid 200 206 180d;
            proxy_cache_valid 404 5m;
            proxy_cache_key "forgecdn:$request_uri";
            proxy_cache_use_stale error timeout updating http_502 http_503;
            proxy_read_timeout 300s;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # ------- Modrinth CDN -------------------------------------
        location /modrinth-cdn/ {
            proxy_pass https://127.0.0.1:8012/;
            proxy_set_header Host cdn.modrinth.com;
            proxy_set_header User-Agent "cofemine-maven-cache/0.1";
            proxy_ssl_name cdn.modrinth.com;
            proxy_cache maven;
            proxy_cache_valid 200 206 180d;
            proxy_cache_valid 404 5m;
            proxy_cache_key "modrinth-cdn:$request_uri";
            add_header X-Cache-Status $upstream_cache_status;
        }

        location / {
            return 404 "not a cache mapping\n";
            add_header Content-Type text/plain;
        }
    }
}
